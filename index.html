<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dead Man's Poker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#0d0906;color:#e8d5a3;font-family:'Cormorant Garamond',Georgia,serif;overflow-x:hidden}

@keyframes flicker{0%,100%{text-shadow:0 0 40px rgba(200,146,42,.34)}42%{text-shadow:0 0 28px rgba(200,146,42,.18)}68%{text-shadow:0 0 50px rgba(200,146,42,.45)}}
@keyframes rise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes glow{0%,100%{box-shadow:0 0 18px rgba(200,146,42,.25),0 8px 24px rgba(0,0,0,.55)}50%{box-shadow:0 0 36px rgba(200,146,42,.55),0 8px 24px rgba(0,0,0,.55)}}
@keyframes spin{to{transform:rotate(360deg)}}

body{background-color:#0d0906;background-image:radial-gradient(ellipse at 50% -5%,rgba(200,146,42,.10),transparent 55%),radial-gradient(ellipse at 50% 125%,rgba(0,0,0,.7),transparent 60%)}

.brand{text-align:center;padding:36px 16px 12px}
.brand-title{font-family:'Cinzel Decorative',serif;font-weight:700;font-size:clamp(28px,5vw,50px);color:#c8922a;letter-spacing:.03em;animation:flicker 4.5s ease-in-out infinite}
.brand-sub{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.4em;text-transform:uppercase;color:rgba(232,213,163,.45);margin-top:10px}

.divider{display:flex;align-items:center;gap:12px;margin:18px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(180,130,60,.2)}
.divider-gem{color:#c8922a;font-size:11px}

.panel{max-width:480px;margin:12px auto 0;background:linear-gradient(160deg,#1f1508 0%,#120d05 100%);border:1px solid rgba(180,130,60,.25);border-radius:8px;box-shadow:inset 0 1px 0 rgba(200,146,42,.1),0 24px 60px rgba(0,0,0,.6);overflow:hidden;animation:rise .45s ease both}
.panel-header{background:linear-gradient(90deg,transparent,rgba(180,130,60,.14),transparent);border-bottom:1px solid rgba(180,130,60,.15);padding:9px 0;text-align:center;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:rgba(232,213,163,.5)}
.panel-body{padding:26px 32px 30px}

label.field-label{display:block;font-family:'Cinzel',serif;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(232,213,163,.5);margin-bottom:6px}
input.field,select.field{background:rgba(255,255,255,.04);border:1px solid rgba(180,130,60,.3);border-radius:4px;color:#e8d5a3;padding:11px 13px;font-family:'Cormorant Garamond',serif;font-size:17px;width:100%;outline:none;transition:border-color .2s,box-shadow .2s}
input.field:focus,select.field:focus{border-color:rgba(200,146,42,.7);box-shadow:0 0 0 3px rgba(200,146,42,.12)}
select.field option{background:#1a1108}

.btn{font-family:'Cinzel',serif;font-weight:600;text-transform:uppercase;letter-spacing:.15em;font-size:14px;border:none;border-radius:4px;padding:13px 20px;cursor:pointer;transition:filter .2s,box-shadow .2s;user-select:none}
.btn:hover{filter:brightness(1.12)}
.btn:active{filter:brightness(.92);transform:scale(.98)}
.btn-gold{background:linear-gradient(135deg,#c8922a,#a07020);color:#0d0906;box-shadow:0 2px 10px rgba(0,0,0,.4)}
.btn-gold:hover{box-shadow:0 0 22px rgba(200,146,42,.4)}
.btn-red{background:linear-gradient(135deg,#6b1515,#4a0e0e);color:#e8d5a3}
.btn-red:hover{box-shadow:0 0 18px rgba(107,21,21,.5)}
.btn-full{width:100%;margin-top:22px}
.btn-sm{font-size:11px;padding:8px 14px;letter-spacing:.1em}

.deck-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.deck-pill{font-family:'Playfair Display',serif;font-weight:700;font-size:13px;min-width:28px;text-align:center;padding:4px 11px;background:rgba(200,146,42,.1);border:1px solid rgba(200,146,42,.3);border-radius:20px;color:#e8d5a3}

.error-msg{margin-top:14px;color:#d98a6a;font-style:italic;font-size:16px}

/* WAITING */
.players-grid{display:flex;flex-wrap:wrap;gap:16px;justify-content:center;margin-top:4px}
.player-chip{display:flex;flex-direction:column;align-items:center;gap:8px;width:90px}
.avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-size:18px;color:#c8922a;background:linear-gradient(135deg,#2a1e0a,#1a1208);flex-shrink:0}
.avatar-me{border:2px solid rgba(200,146,42,.85);box-shadow:0 0 18px rgba(200,146,42,.3)}
.avatar-other{border:2px solid rgba(200,146,42,.4);box-shadow:0 4px 12px rgba(0,0,0,.5)}
.avatar-voted{box-shadow:0 0 0 3px rgba(200,146,42,.22),0 0 18px rgba(200,146,42,.3)!important}
.name-tag{font-family:'Cormorant Garamond',serif;font-size:13px;background:rgba(0,0,0,.4);border:1px solid rgba(180,130,60,.2);border-radius:12px;padding:2px 10px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.name-tag-me{color:#c8922a}

.invite-box{margin-top:20px;background:rgba(0,0,0,.25);border:1px solid rgba(180,130,60,.2);border-radius:6px;padding:12px 14px}
.invite-label{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(232,213,163,.45);margin-bottom:8px}
.invite-row{display:flex;gap:8px;align-items:center}
.invite-input{flex:1;min-width:0;background:rgba(255,255,255,.03);border:1px solid rgba(180,130,60,.25);border-radius:4px;color:rgba(232,213,163,.65);padding:9px 11px;font-family:'Cormorant Garamond',serif;font-size:14px;outline:none}

.btn-row{display:flex;gap:12px;margin-top:22px}

/* GAME */
.game-wrap{max-width:940px;margin:6px auto 0;padding:0 16px 40px;animation:rise .45s ease both}
.game-bar{display:flex;flex-wrap:wrap;align-items:center;gap:12px;background:linear-gradient(160deg,#1f1508,#120d05);border:1px solid rgba(180,130,60,.25);border-radius:8px;padding:10px 16px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#e8d5a3;box-shadow:inset 0 1px 0 rgba(200,146,42,.08),0 12px 30px rgba(0,0,0,.5)}
.game-bar-sep{color:rgba(180,130,60,.35)}
.game-bar-muted{color:rgba(232,213,163,.45)}
.game-bar-spacer{flex:1}

/* TABLE */
.table-wrap{position:relative;width:100%;max-width:900px;height:520px;margin:16px auto 0}
.felt-outer{position:absolute;left:50%;top:240px;transform:translate(-50%,-50%);width:580px;max-width:90%;height:290px;border-radius:50%;background:radial-gradient(ellipse at 50% 36%,#5c3010,#2a1508 72%,#1a0e04);padding:12px;box-shadow:0 0 0 8px rgba(30,15,5,.8),0 0 60px rgba(0,0,0,.8)}
.felt-inner{width:100%;height:100%;border-radius:50%;background:radial-gradient(ellipse at center,#2a5238 0%,#1e3d2a 60%,#152b1e 100%);box-shadow:inset 0 0 60px rgba(0,0,0,.55)}
.felt-gem{position:absolute;left:50%;top:240px;transform:translate(-50%,-50%);z-index:1;color:rgba(200,146,42,.14);font-size:36px;pointer-events:none;user-select:none}

.table-center{position:absolute;left:50%;top:240px;transform:translate(-50%,-50%);z-index:6;text-align:center;width:320px;max-width:80%}

.verdict-box{background:linear-gradient(160deg,#1f1508,#120d05);border:1px solid rgba(180,130,60,.3);border-radius:8px;box-shadow:inset 0 0 40px rgba(200,146,42,.12),0 20px 50px rgba(0,0,0,.7);padding:16px 24px 20px;animation:rise .4s ease both}
.verdict-label{font-family:'Cinzel',serif;font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:rgba(232,213,163,.45)}
.verdict-value{font-family:'Playfair Display',serif;font-weight:900;font-size:4rem;line-height:1;color:#c8922a;text-shadow:0 0 30px rgba(200,146,42,.4);margin-top:2px}
.verdict-unanimous{font-family:'Cinzel',serif;font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#7fbf93;margin-top:2px}
.verdict-sub{font-family:'Cormorant Garamond',serif;font-size:15px;color:rgba(232,213,163,.5);margin-top:3px}

.range-bar{margin-top:14px}
.range-track{position:relative;height:3px;background:rgba(180,130,60,.2);border-radius:2px}
.range-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:13px;height:13px;border-radius:50%;background:#c8922a;box-shadow:0 0 14px rgba(200,146,42,.6)}
.range-labels{display:flex;justify-content:space-between;margin-top:6px;font-family:'Cinzel',serif;font-size:10px;color:rgba(232,213,163,.35)}

.reveal-btn{font-family:'Cinzel',serif;font-weight:600;text-transform:uppercase;letter-spacing:.18em;font-size:17px;background:linear-gradient(135deg,#c8922a,#a07020);color:#0d0906;border:none;border-radius:6px;padding:16px 30px;cursor:pointer;animation:glow 2.6s ease-in-out infinite;transition:filter .15s}
.reveal-btn:hover{filter:brightness(1.12)}
.reveal-btn:active{filter:brightness(.9)}

.waiting-box{display:inline-block;background:linear-gradient(160deg,#1f1508,#120d05);border:1px solid rgba(180,130,60,.25);border-radius:8px;box-shadow:0 12px 30px rgba(0,0,0,.6);padding:12px 22px}
.waiting-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:#c8922a}
.waiting-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:rgba(232,213,163,.5);margin-top:3px}

/* SEATS */
.seat{position:absolute;transform:translate(-50%,-50%);display:flex;flex-direction:column;align-items:center;gap:6px;width:110px;z-index:4}
.seat-slot{width:46px;height:64px;border-radius:7px}
.seat-slot-empty{border:1px solid rgba(180,130,60,.2);background:rgba(255,255,255,.02)}

.card-wrap{width:46px;height:64px;perspective:600px}
.card-inner{position:relative;width:100%;height:100%;transition:transform .6s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d}
.card-inner.flipped{transform:rotateY(180deg)}
.card-face,.card-back{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:7px}
.card-back{background:#1a0a0a;background-image:repeating-linear-gradient(45deg,rgba(180,130,60,.15) 0 1px,transparent 1px 9px),repeating-linear-gradient(-45deg,rgba(180,130,60,.15) 0 1px,transparent 1px 9px);border:1px solid rgba(200,146,42,.4)}
.card-face{transform:rotateY(180deg);background:#f5ead8;border:1px solid rgba(180,130,60,.45);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:6px 0;color:#1a0e04}
.card-face-num{font-family:'Playfair Display',serif;font-weight:900;line-height:1}
.card-face-orn{font-size:10px;color:rgba(200,146,42,.7);user-select:none}

/* HAND — hover через CSS, не через JS state */
.hand-caption{text-align:center;margin-top:8px;font-family:'Cinzel',serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:rgba(200,146,42,.75)}
.hand-wrap{display:flex;justify-content:center;align-items:flex-end;gap:-8px;padding:16px 16px 0;min-height:140px;flex-wrap:nowrap;overflow:visible}

.hand-card{cursor:pointer;flex-shrink:0;transition:transform .2s cubic-bezier(.4,0,.2,1);transform-origin:bottom center;position:relative}
.hand-card:hover{transform:translateY(-18px) scale(1.06)!important;z-index:50!important}
.hand-card.selected-card{transform:translateY(-28px) scale(1.08)!important;z-index:51!important}

.hand-card-inner{width:66px;height:94px;border-radius:8px;background:#f5ead8;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:8px 0;color:#1a0e04;pointer-events:none}
.hand-card-inner .card-face-orn{font-size:11px;color:rgba(200,146,42,.75)}
.hand-card-num{font-family:'Playfair Display',serif;font-weight:900;line-height:1}
.hand-card.selected-card .hand-card-inner{border:2px solid #c8922a;box-shadow:0 12px 30px rgba(200,146,42,.35)}
.hand-card:not(.selected-card) .hand-card-inner{border:1px solid rgba(180,130,60,.4);box-shadow:0 6px 16px rgba(0,0,0,.5)}

.hand-revealed .hand-card{cursor:default}
.hand-revealed .hand-card:hover{transform:none!important}

/* LOADER */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:16px;color:rgba(232,213,163,.45);font-family:'Cinzel',serif;font-size:12px;letter-spacing:.2em;text-transform:uppercase}
.loader-spin{width:32px;height:32px;border:2px solid rgba(180,130,60,.2);border-top-color:#c8922a;border-radius:50%;animation:spin .8s linear infinite}
</style>
</head>
<body>

<div class="brand">
  <div class="brand-title">Dead Man's Poker</div>
  <div class="brand-sub">Estimation Saloon</div>
</div>

<div id="screen-lobby" class="screen">
  <div class="panel">
    <div class="panel-header">Take Your Seat</div>
    <div class="panel-body">
      <div style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:18px;color:rgba(232,213,163,.55);text-align:center">Place your bets. Settle the score.</div>
      <div class="divider"><span class="divider-gem">✦</span></div>
      <label class="field-label">Your Name</label>
      <input class="field" id="lobby-name" placeholder="e.g. Doc Holliday" autocomplete="off">
      <label class="field-label" style="margin-top:16px">Choose Deck</label>
      <select class="field" id="lobby-deck">
        <option value="fibonacci">Fibonacci</option>
        <option value="modified">Modified Fibonacci</option>
        <option value="powers2">Powers of 2</option>
        <option value="tshirt">T-Shirt Sizes</option>
        <option value="hours">Hours</option>
      </select>
      <div class="deck-pills" id="lobby-pills"></div>
      <div class="error-msg" id="lobby-error" style="display:none"></div>
      <button class="btn btn-gold btn-full" id="lobby-create-btn">Create Room</button>
    </div>
  </div>
</div>

<div id="screen-join" class="screen" style="display:none">
  <div class="panel" style="max-width:420px">
    <div class="panel-header">You're Invited</div>
    <div class="panel-body">
      <div style="text-align:center">
        <div style="font-family:'Cinzel',serif;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(232,213,163,.45)">Table</div>
        <div id="join-room-id" style="font-family:'Playfair Display',serif;font-weight:900;font-size:32px;letter-spacing:.12em;color:#c8922a;text-shadow:0 0 24px rgba(200,146,42,.3);margin-top:2px"></div>
      </div>
      <div class="divider"><span class="divider-gem">✦</span></div>
      <label class="field-label">Your Name</label>
      <input class="field" id="join-name" placeholder="e.g. Calamity Jane" autocomplete="off">
      <div class="error-msg" id="join-error" style="display:none"></div>
      <button class="btn btn-gold btn-full" id="join-btn">Join the Table</button>
    </div>
  </div>
</div>

<div id="screen-waiting" class="screen" style="display:none">
  <div class="panel" style="max-width:560px">
    <div class="panel-header">The Table Is Set</div>
    <div class="panel-body">
      <div style="text-align:center;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16px;color:rgba(232,213,163,.55)">Waiting for the players to gather…</div>
      <div id="waiting-room-id" style="text-align:center;font-family:'Playfair Display',serif;font-weight:700;letter-spacing:.16em;font-size:17px;color:#c8922a;margin-top:6px"></div>
      <div class="divider"><span class="divider-gem">✦</span></div>
      <div class="players-grid" id="waiting-players"></div>
      <div class="invite-box">
        <div class="invite-label">Invite a Gunslinger</div>
        <div class="invite-row">
          <input class="invite-input" id="waiting-invite-input" readonly>
          <button class="btn btn-gold btn-sm" id="waiting-copy-btn">Copy Invite</button>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn btn-gold" style="flex:2" id="waiting-start-btn">Start the Game</button>
        <button class="btn btn-red" style="flex:1" id="waiting-leave-btn">Leave</button>
      </div>
    </div>
  </div>
</div>

<div id="screen-game" class="screen" style="display:none">
  <div class="game-wrap">
    <div class="game-bar">
      <span id="game-round" style="color:#c8922a">Round 1</span>
      <span class="game-bar-sep">✦</span>
      <span id="game-table-id"></span>
      <span class="game-bar-sep">✦</span>
      <span class="game-bar-muted" id="game-votes-count"></span>
      <span class="game-bar-spacer"></span>
      <span class="game-bar-muted" id="game-pid-debug" style="font-size:9px;opacity:.4"></span>
      <button class="btn btn-gold btn-sm" id="game-copy-btn">Link</button>
      <button class="btn btn-red btn-sm" id="game-leave-btn">Leave</button>
    </div>
    <div class="table-wrap" id="game-table-wrap">
      <div class="felt-outer"><div class="felt-inner"></div></div>
      <div class="felt-gem">✦</div>
      <div class="table-center" id="game-table-center"></div>
    </div>
    <div class="hand-caption" id="game-hand-caption">Your hand — choose your bet</div>
    <div class="hand-wrap" id="game-hand-wrap"></div>
  </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
